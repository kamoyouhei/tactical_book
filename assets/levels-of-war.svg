<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">戦争の階層と目的の連鎖</title>
  <desc id="desc">政策目的から戦略、作戦、戦術へ具体化し、結果と学習が上位へ戻る関係を示す概念図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#e8eef5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity=".14"/>
    </filter>
    <marker id="arrowDown" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <marker id="arrowUp" markerWidth="12" markerHeight="12" refX="2" refY="6" orient="auto">
      <path d="M12,0 L0,6 L12,12 z" fill="#64748b"/>
    </marker>
    <style>
      .jp { font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif; }
      .label { font-size: 30px; font-weight: 700; fill: #fff; }
      .text { font-size: 22px; fill: #1f2937; }
      .small { font-size: 18px; fill: #475569; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" class="jp" font-size="34" font-weight="700" fill="#172033">戦争の階層――目的を行動へ、結果を学習へ</text>
  <text x="600" y="92" text-anchor="middle" class="jp small">階層は部隊の大きさではなく、達成しようとする目的の性質で捉える</text>

  <g filter="url(#shadow)">
    <rect x="170" y="130" width="760" height="112" rx="18" fill="#24543d"/>
    <rect x="170" y="276" width="760" height="112" rx="18" fill="#284d73"/>
    <rect x="170" y="422" width="760" height="112" rx="18" fill="#376b9e"/>
    <rect x="170" y="568" width="760" height="112" rx="18" fill="#4d83b8"/>
  </g>

  <text x="215" y="180" class="jp label">政策目的</text>
  <text x="215" y="216" class="jp" font-size="20" fill="#d9f2e4">どのような平和・秩序・安全を実現するか</text>

  <text x="215" y="326" class="jp label">戦略</text>
  <text x="215" y="362" class="jp" font-size="20" fill="#dceafb">目的のために手段と資源をどう組み合わせるか</text>

  <text x="215" y="472" class="jp label">作戦</text>
  <text x="215" y="508" class="jp" font-size="20" fill="#e0efff">戦術行動を時間・空間・目的に沿ってどう結びつけるか</text>

  <text x="215" y="618" class="jp label">戦術</text>
  <text x="215" y="654" class="jp" font-size="20" fill="#e9f4ff">個々の戦闘・接触・任務で戦力をどう運用するか</text>

  <line x1="970" y1="170" x2="970" y2="638" stroke="#334155" stroke-width="5" marker-end="url(#arrowDown)"/>
  <text x="1000" y="405" class="jp text" transform="rotate(90 1000 405)" text-anchor="middle">目的の具体化・任務・資源配分</text>

  <line x1="1080" y1="638" x2="1080" y2="170" stroke="#64748b" stroke-width="4" stroke-dasharray="12 10" marker-end="url(#arrowUp)"/>
  <text x="1115" y="405" class="jp text" transform="rotate(-90 1115 405)" text-anchor="middle">結果・評価・学習・政治的影響</text>

  <rect x="42" y="300" width="98" height="212" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="91" y="340" text-anchor="middle" class="jp" font-size="18" font-weight="700" fill="#334155">作戦術</text>
  <text x="91" y="375" text-anchor="middle" class="jp small">戦略と</text>
  <text x="91" y="405" text-anchor="middle" class="jp small">戦術を</text>
  <text x="91" y="435" text-anchor="middle" class="jp small">結ぶ</text>
  <text x="91" y="472" text-anchor="middle" class="jp" font-size="28" fill="#284d73">↕</text>

  <text x="600" y="726" text-anchor="middle" class="jp small">図0-1：概念図。各層の境界は固定的ではなく、相互作用する。</text>
</svg>
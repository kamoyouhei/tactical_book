<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">原則をチェックリストにしない判断循環</title>
  <desc id="desc">目的と状況を起点に、原則で盲点と緊張を探し、複数の仮説を比較し、実行後の観測から前提と判断を更新する循環を示す。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e7eef6"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#466b8f"/>
    </marker>
    <marker id="feedback" markerWidth="12" markerHeight="12" refX="2" refY="6" orient="auto">
      <path d="M12,0 L0,6 L12,12 z" fill="#64748b"/>
    </marker>
    <style>
      .jp { font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif; }
      .node-title { font-size: 25px; font-weight: 700; fill: #fff; }
      .node-sub { font-size: 17px; fill: #edf6ff; }
      .note { font-size: 18px; fill: #475569; }
      .tag { font-size: 17px; font-weight: 700; fill: #284d73; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" class="jp" font-size="34" font-weight="700" fill="#172033">原則は答えではなく、問いを構成する道具</text>
  <text x="600" y="92" text-anchor="middle" class="jp note">同じ重みで採点せず、盲点・緊張・前提の破綻を探す</text>

  <g filter="url(#shadow)">
    <rect x="70" y="185" width="245" height="150" rx="24" fill="#24543d"/>
    <rect x="365" y="185" width="245" height="150" rx="24" fill="#284d73"/>
    <rect x="660" y="185" width="245" height="150" rx="24" fill="#376b9e"/>
    <rect x="955" y="185" width="180" height="150" rx="24" fill="#4d83b8"/>
  </g>

  <text x="192" y="230" text-anchor="middle" class="jp node-title">目的と状況</text>
  <text x="192" y="267" text-anchor="middle" class="jp node-sub">上位目的・相手・環境</text>
  <text x="192" y="296" text-anchor="middle" class="jp node-sub">時間・法・兵站・情報</text>

  <text x="487" y="230" text-anchor="middle" class="jp node-title">原則で点検</text>
  <text x="487" y="267" text-anchor="middle" class="jp node-sub">盲点と競合要求を探す</text>
  <text x="487" y="296" text-anchor="middle" class="jp node-sub">訳語と版を確認する</text>

  <text x="782" y="230" text-anchor="middle" class="jp node-title">仮説を比較</text>
  <text x="782" y="267" text-anchor="middle" class="jp node-sub">複数の説明・選択肢</text>
  <text x="782" y="296" text-anchor="middle" class="jp node-sub">危険の移転をたどる</text>

  <text x="1045" y="230" text-anchor="middle" class="jp node-title">実行・観測</text>
  <text x="1045" y="267" text-anchor="middle" class="jp node-sub">結果と反対情報</text>
  <text x="1045" y="296" text-anchor="middle" class="jp node-sub">見直しの兆候</text>

  <g fill="none" stroke="#466b8f" stroke-width="5" marker-end="url(#arrow)">
    <line x1="315" y1="260" x2="350" y2="260"/>
    <line x1="610" y1="260" x2="645" y2="260"/>
    <line x1="905" y1="260" x2="940" y2="260"/>
  </g>

  <path d="M1045 350 C1030 540 825 620 600 620 C360 620 185 535 192 350" fill="none" stroke="#64748b" stroke-width="5" stroke-dasharray="13 10" marker-end="url(#feedback)"/>
  <text x="600" y="660" text-anchor="middle" class="jp" font-size="21" font-weight="700" fill="#475569">結果から、計画だけでなく目的・前提・判断基準も更新する</text>

  <rect x="250" y="395" width="700" height="150" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="432" text-anchor="middle" class="jp" font-size="22" font-weight="700" fill="#334155">原則間の緊張を明示する</text>
  <g class="jp tag">
    <rect x="292" y="460" width="180" height="44" rx="22" fill="#e8f1f9"/>
    <rect x="510" y="460" width="180" height="44" rx="22" fill="#e8f1f9"/>
    <rect x="728" y="460" width="180" height="44" rx="22" fill="#e8f1f9"/>
    <text x="382" y="489" text-anchor="middle">集中 ↔ 戦力節約</text>
    <text x="600" y="489" text-anchor="middle">攻勢 ↔ 保全</text>
    <text x="818" y="489" text-anchor="middle">簡明 ↔ 多組織連携</text>
  </g>

  <text x="600" y="720" text-anchor="middle" class="jp note">図1-1：分析用の独自概念図。特定軍種の正式な計画手順ではない。</text>
</svg>
